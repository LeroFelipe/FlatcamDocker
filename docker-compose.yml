services:
  flatcam:
    build: .
    container_name: flatcam_gui
    environment:
      - DISPLAY=${DISPLAY}
      - QT_QPA_PLATFORM=xcb
      - XDG_RUNTIME_DIR=/run/user/1000
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./projects:/app/projects
      - /dev:/dev
    network_mode: host
    privileged: true
    restart: "no"