services:
  flatcam:
    build: .
    container_name: flatcam_gui
    user: "${MY_UID}:${MY_GID}"
    environment:
      - DISPLAY=${DISPLAY}
      - QT_QPA_PLATFORM=xcb
      - XAUTHORITY=/tmp/.Xauthority
      - HOME=/home/developer
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${XAUTHORITY:-$HOME/.Xauthority}:/tmp/.Xauthority
      - ./projects:/app/projects:Z
      - ./config:/home/developer:Z
      - /dev:/dev
    network_mode: host
    privileged: true
    restart: "no"